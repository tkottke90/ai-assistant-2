# AI Assistant 2 — Configuration Example
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to one of the following locations:
#
#   Development (npm run dev):  ./config/config.yaml
#   Custom location:            set CONFIG_DIR=<path> before running the server
#
# All settings have sensible defaults. The server will auto-create a
# config.yaml from defaults on first run if the file does not exist.
# ─────────────────────────────────────────────────────────────────────────────

# ── Server ────────────────────────────────────────────────────────────────────
# HTTP server binding. Requires restart to take effect.
server:
  # Port the Express server listens on.
  port: 3000

  # Network interface to bind to.
  #   localhost  — only reachable from this machine (recommended for dev)
  #   0.0.0.0   — reachable from other devices on your network
  host: localhost

  # CORS settings. Add any origin that should be allowed to call the API.
  # The Vite dev server runs on 5173 by default.
  cors:
    allow_origins:
      - http://localhost:5173   # Vite dev server
      - http://localhost:3000   # Alternative / production frontend
    allow_headers:
      - Content-Type
      - Authorization

# ── Logging ───────────────────────────────────────────────────────────────────
# Controls what the server writes to the console and to log files in
# CONFIG_DIR/logs/. Requires restart to take effect.
logging:
  # Minimum severity to emit. One of:
  #   error | warn | info | http | verbose | debug | silly
  # "info" is a good default for production; use "debug" in development.
  level: info

  # Write log lines to stdout/stderr.
  toConsole: true

  # Write log lines to CONFIG_DIR/logs/ (one file per day, rotated automatically).
  toFile: true

  # URL paths to suppress from the HTTP access log.
  # Useful for noisy health-check or metrics endpoints.
  excludePaths:
    - /api/health

# ── LLM Providers ─────────────────────────────────────────────────────────────
# One or more AI model providers. The first entry in the list is used as the
# default when no specific alias is requested.
# Requires restart to take effect.
llm:
  apis:
    # ── Ollama (local inference) ──────────────────────────────────────────────
    # Ollama runs models entirely on your machine — nothing leaves your network.
    # Install Ollama from https://ollama.com and pull a model first:
    #   ollama pull qwen3:8b
    - alias: local-ollama     # Arbitrary name used to select this provider
      provider: ollama
      defaultModel: qwen3:8b  # Any model you have pulled locally
      location: http://localhost:11434
      # apiKey is not required for a local Ollama instance.
      # Uncomment if your Ollama setup uses an auth token.
      # apiKey: ""

      # Optional cost tracking (informational only — not enforced).
      # Rates are per 1 000 tokens (scale: 1000) or per 1 000 000 (scale: 1000000).
      cost:
        inputToken: 0
        outputToken: 0
        scale: 1000

    # ── OpenAI-compatible API ─────────────────────────────────────────────────
    # Any OpenAI-compatible endpoint works here: OpenAI, Azure OpenAI, Groq,
    # a remote Ollama instance, LM Studio, llama.cpp server, etc.
    # Uncomment and fill in to enable.
    #
    # - alias: openai
    #   provider: openai
    #   defaultModel: gpt-4o
    #   location: https://api.openai.com/v1
    #   apiKey: sk-...   # Your OpenAI API key
    #   cost:
    #     inputToken: 2.50    # USD per 1 000 000 input tokens for gpt-4o
    #     outputToken: 10.00
    #     scale: 1000000

    # ── Custom / self-hosted OpenAI-compatible server ─────────────────────────
    # Example: a GPU workstation on your LAN running vLLM or a remote Ollama.
    #
    # - alias: home-gpu
    #   provider: custom       # Use "custom" for any non-standard base URL
    #   defaultModel: qwen3:14b
    #   location: http://192.168.1.50:11434/v1
    #   apiKey: ""
    #   cost:
    #     inputToken: 0
    #     outputToken: 0
    #     scale: 1000

# ── Tools ─────────────────────────────────────────────────────────────────────
# Extend what agents can do by giving them access to external tools.
# All sub-sections are optional — omit any section you don't need.
tools:

  # ── Simple tools (user-defined JS modules) ──────────────────────────────────
  # A "simple tool" is a JavaScript file that exports a create(config) factory
  # returning a LangChain StructuredTool. The file is resolved relative to
  # CONFIG_DIR.
  #
  # Example:
  # simple:
  #   - id: weather           # Unique identifier (used internally and in the UI)
  #     name: Get Weather     # Human-readable name shown in the agent tool list
  #     description: >        # Concise description — the agent uses this to decide when to call the tool
  #       Returns current weather for a given city.
  #     path: tools/weather.js  # Path relative to CONFIG_DIR
  #     runtime: node           # Only "node" is supported
  #     config:                 # Passed verbatim to the create(config) factory
  #       apiKey: ""
  #       units: metric
  simple: []

  # ── MCP servers (Model Context Protocol) ────────────────────────────────────
  # Connect any MCP-compatible tool server. The agent can then call any tool
  # that server exposes.
  #
  # Two transports are supported:
  #   stdio — starts a local process and communicates over stdin/stdout
  #   http  — connects to an already-running HTTP MCP server
  #
  # stdio example (Docker MCP gateway):
  # mcp_servers:
  #   - id: docker-mcp           # Unique identifier referenced in AgentTool assignments
  #     name: Docker MCP Toolkit
  #     transport: stdio
  #     command: docker          # Executable to run
  #     args:
  #       - mcp
  #       - gateway
  #       - run
  #     env: {}                  # Optional environment variables passed to the process
  #
  # http example:
  # mcp_servers:
  #   - id: my-mcp-server
  #     name: My MCP Server
  #     transport: http
  #     url: http://localhost:8080
  mcp_servers: []

  # ── Permission request settings ──────────────────────────────────────────────
  # How long (seconds) a pending tool-approval request stays valid before it is
  # automatically denied and the agent receives an error. Default: 900 (15 min).
  permission_request_ttl_seconds: 900

  # ── Tool discovery settings ───────────────────────────────────────────────────
  # When an agent searches for tools to use, these limits control the results.

  # Maximum number of tools returned by a single discovery search.
  discovery_max_results: 5

  # If a keyword search returns fewer results than this, the system falls back
  # to a broader semantic search to fill the gap.
  discovery_keyword_min_results: 2
