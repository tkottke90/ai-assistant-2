# AI Assistant Configuration Example
# Copy this file to ./config/config.yaml for local development
# or to ~/.config/ai-assistant/config.yaml for system-wide configuration

# Server Configuration
# Changes to this section require application restart
server:
  host: 0.0.0.0
  port: 8000
  reload: true  # Auto-reload on code changes (development only)
  workers: 1    # Number of worker processes

# CORS Configuration
# Changes to this section do NOT require restart
cors:
  allow_origins:
    - http://localhost:5173  # Vite dev server
    - http://localhost:3000  # Alternative frontend port
  allow_credentials: true
  allow_methods:
    - "*"
  allow_headers:
    - "*"

# LLM Provider Configuration (for chat/generation)
# Changes to this section require application restart
llm:
  # Default provider for new automations
  default_provider: ollama
  
  # Available LLM providers (can configure multiple instances)
  providers:
    # Ollama (local inference) - Primary provider
    ollama:
      type: ollama
      base_url: http://localhost:11434
      default_model: mistral:7b
      api_key: null  # Optional: if your Ollama instance requires auth
      
      # Context window settings (conservative for local models)
      max_context_activities: 10
      max_context_tokens: 3000
      max_tool_definition_tokens: 500
      context_overflow_strategy: summarize  # Options: summarize, truncate
      temperature: 0.7
    
    # Anthropic Claude (API) - Uncomment to enable
    # anthropic:
    #   type: anthropic
    #   api_key_env: ANTHROPIC_API_KEY  # Environment variable name
    #   base_url: null  # Optional: custom API endpoint
    #   default_model: claude-3-5-sonnet-20241022
    #   
    #   # Context window settings (large for API models)
    #   max_context_activities: 50
    #   max_context_tokens: 150000
    #   max_tool_definition_tokens: 2000
    #   context_overflow_strategy: truncate
    #   temperature: 0.7
    
    # OpenAI (API) - Uncomment to enable
    # openai:
    #   type: openai
    #   api_key_env: OPENAI_API_KEY  # Environment variable name
    #   base_url: null  # Optional: custom API endpoint (e.g., Azure OpenAI)
    #   default_model: gpt-4
    #   
    #   # Context window settings (large for API models)
    #   max_context_activities: 50
    #   max_context_tokens: 120000
    #   max_tool_definition_tokens: 2000
    #   context_overflow_strategy: truncate
    #   temperature: 0.7

# Database Configuration
# Changes to this section do NOT require restart
# Defaults are shown below - uncomment and modify to customize
# database:
#   sqlite:
#     path: "./data/ai_assistant.db"  # Path to SQLite database file, or ':memory:' for in-memory
#     create_on_missing: true  # Automatically create database if it doesn't exist

# Alternative SQLite configurations:
# In-memory database (data lost on restart):
# database:
#   sqlite:
#     file_path: ":memory:"
#     create_on_missing: true
#
# Custom path with directory auto-creation:
# database:
#   sqlite:
#     file_path: "~/.local/share/ai-assistant/app.db"
#     create_on_missing: true
  
  # Embedding model configuration (for knowledge base semantic search)
  embeddings:
    provider: "ollama"  # Options: ollama, openai, anthropic
    model: "nomic-embed-text"  # Provider-specific model name
    
    # Provider configurations (only active provider's config is used)
    providers:
      ollama:
        base_url: "http://localhost:11434"
        timeout_seconds: 30
      
      openai:
        api_key_env: "OPENAI_API_KEY"  # Environment variable name
        # Alternative models: text-embedding-3-large, text-embedding-ada-002
      
      anthropic:
        api_key_env: "ANTHROPIC_API_KEY"
        # Anthropic doesn't offer embeddings yet (placeholder)

# Example: Multiple provider configuration
# You can configure multiple instances of the same provider type with different settings:
#
# llm:
#   default_provider: ollama-fast
#   providers:
#     ollama-fast:
#       type: ollama
#       base_url: http://localhost:11434
#       default_model: mistral:7b
#       temperature: 0.5
#       max_context_tokens: 2000
#     
#     ollama-creative:
#       type: ollama
#       base_url: http://localhost:11434
#       default_model: mixtral:8x7b
#       temperature: 0.9
#       max_context_tokens: 8000
#     
#     claude:
#       type: anthropic
#       api_key_env: ANTHROPIC_API_KEY
#       default_model: claude-3-5-sonnet-20241022
#       max_context_tokens: 150000

# Logging Configuration
# Changes to this section require application restart
logging:
  # Basic settings
  level: INFO  # Options: DEBUG, HTTP, INFO, WARNING, ERROR, CRITICAL
  format: json  # Options: json (for log aggregation), text (human-readable)

  # File logging
  enable_file_logging: true
  log_file: ~/.config/ai-assistant/logs/app.log
  max_bytes: 10485760  # 10 MB - maximum log file size before rotation
  backup_count: 5  # Number of backup log files to keep

  # Console logging
  enable_console_logging: true
  console_level: INFO  # Optional: separate level for console (defaults to global level)

  # OpenTelemetry Configuration (optional - for production observability)
  # Vendor-neutral standard supporting Grafana, Jaeger, Datadog, New Relic, etc.
  enable_otel: false
  
  # OTLP Endpoint (required when enable_otel is true)
  # Examples:
  #   Grafana Alloy gRPC: http://alloy:4317
  #   Grafana Alloy HTTP: http://alloy:4318
  #   Jaeger: http://jaeger:4317
  otel_endpoint: null
  
  # Protocol selection
  otel_protocol: grpc  # Options: grpc (default), http
  
  # Service Identification (appears as labels in observability platforms)
  otel_service_name: ai-assistant
  otel_service_version: null  # e.g., 1.0.0
  otel_service_namespace: null  # e.g., production, staging
  otel_deployment_environment: development  # e.g., development, staging, production
  
  # Connection Settings
  otel_insecure: true  # Set to false with TLS in production
  
  # Optional: Authentication headers for cloud platforms
  # otel_headers:
  #   Authorization: "Bearer YOUR_TOKEN_HERE"
  
  # Export Configuration
  otel_export_logs: true
  otel_export_traces: true
  otel_export_metrics: false  # Future use
  
  # Performance Tuning
  otel_batch_size: 512  # Logs/traces per batch (1-2048)
  otel_schedule_delay_ms: 5000  # Delay between batches (100-30000ms)
  otel_export_timeout_ms: 30000  # Export timeout (1000-60000ms)
  otel_max_queue_size: 2048  # Max pending items (512-8192)
  
  # Custom Resource Attributes (appear as labels in Grafana/observability platforms)
  # otel_resource_attributes:
  #   region: us-east-1
  #   cluster: prod-cluster-01
  #   team: platform

  # Module-specific log levels (optional)
  module_levels:
    # ai_assistant.llm: DEBUG  # Enable debug logs for LLM module
    # ai_assistant.config: INFO

  # HTTP Middleware settings
  enable_http_logging: true
  log_request_body: false  # WARNING: May log sensitive data (passwords, API keys)
  log_response_body: false  # WARNING: Performance impact, large responses
  exclude_paths:
    - /health  # Don't log health check requests

# Notification Configuration
# Changes to this section do NOT require restart
notifications:
  # In-App Notifications (persistent UI notifications)
  in_app:
    enabled: true  # Enable persistent in-app notifications
    max_unread: 50  # Maximum unread notifications before auto-archiving oldest
    auto_dismiss_after_days: 7  # Days before INFO notifications auto-dismiss (WARNING/CRITICAL never auto-dismiss)
  
  # Device Push Notifications (Web Push API) - OPTIONAL
  # Uncomment and configure to enable device push notifications:
  # device_push:
  #   enabled: true  # Enable web push notifications to browser/device
  #   vapid_public_key: ""  # VAPID public key for Web Push (generate with web-push library)
  #   vapid_private_key_env: "VAPID_PRIVATE_KEY"  # Environment variable containing VAPID private key
  #   # To generate VAPID keys: npx web-push generate-vapid-keys
  
  # External Webhook Notifications (HTTP-based, supports any service) - OPTIONAL
  # Uncomment and configure to enable webhook notifications:
  # external_webhook:
  #   enabled: true  # Enable webhook notifications
  #   base_url: ""  # Webhook endpoint URL
  #   method: "POST"  # HTTP method: POST, GET, PUT, DELETE
  #   headers: {}  # Additional HTTP headers (e.g., for authentication)
  #   payload_type: "json"  # Payload format: json, form, text
  #   payload_template: {}  # Define payload structure (see examples below)

# Example webhook configurations:

# Slack webhook:
# external_webhook:
#   enabled: true
#   url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
